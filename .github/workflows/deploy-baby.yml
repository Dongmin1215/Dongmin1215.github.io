name: Deploy Baby App

on:
  push:
    branches: [main]
    paths:
      - 'baby-app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: baby-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: baby-app

      - name: Build
        run: npm run build
        working-directory: baby-app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baby/
          git diff --staged --quiet || git commit -m "chore: build baby app [skip ci]"
          git push
